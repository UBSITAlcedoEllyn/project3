<div *ngIf="supplier" class="details-container">
  <h2>Edit Supplier: {{ supplier.supplierName }}</h2>

  <div class="form-group">
    <label>Supplier ID (Read-only):</label>
    <input [ngModel]="supplier.id" name="id" readonly /> </div>

  <div class="form-group">
    <label>Supplier Name:</label>
    <input [(ngModel)]="supplier.supplierName" name="supplierName" /> </div>

  <div class="form-group">
    <label>Location:</label>
    <input [(ngModel)]="supplier.location" name="location" />
  </div>

  <div class="form-group">
    <label>Email:</label>
    <input [(ngModel)]="supplier.email" type="email" name="email" />
  </div>

  <div class="form-group">
    <label>Contact Person:</label>
    <input [(ngModel)]="supplier.contactPerson" name="contactPerson" />
  </div>

  <div class="form-group">
    <label>Phone:</label>
    <input [(ngModel)]="supplier.phone" name="phone" />
  </div>

  <div class="actions">
    <button class="save-btn" (click)="saveChanges()">Save Changes</button> [cite: 181]
    <button class="back-btn" (click)="goBack()">Back to List</button> [cite: 182]
  </div>
</div>
